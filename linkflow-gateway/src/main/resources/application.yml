server:
  port: 8088

spring:
  application:
    name: linkflow-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: linkflow
      config:
        server-addr: localhost:8848
        namespace: linkflow
        file-extension: yml
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User 服务路由
        - id: linkflow-user
          uri: lb://linkflow-user
          predicates:
            - Path=/proxy/user/**
          filters:
            - StripPrefix=1

        # Campaign 服务路由
        - id: linkflow-campaign
          uri: lb://linkflow-campaign
          predicates:
            - Path=/proxy/campaign/**
          filters:
            - StripPrefix=1

        # Workflow 服务路由
        - id: linkflow-workflow
          uri: lb://linkflow-workflow
          predicates:
            - Path=/proxy/workflow/**
          filters:
            - StripPrefix=1

dubbo:
  application:
    name: linkflow-gateway
    qos-enable: false
  registry:
    address: nacos://localhost:8848
    parameters:
      namespace: linkflow
  protocol:
    port: -1
  consumer:
    check: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

linkflow:
  auth:
    jwt:
      secret: ${LINKFLOW_JWT_SECRET:linkflow-local-development-secret-key-2026}
      expire-minutes: ${LINKFLOW_JWT_EXPIRE_MINUTES:120}

# 日志配置
logging:
  level:
    com.linkflow: debug
    org.springframework.cloud.gateway: debug
