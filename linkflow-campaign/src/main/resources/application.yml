server:
  port: 8081

spring:
  application:
    name: linkflow-campaign
  datasource:
    url: jdbc:mysql://localhost:3306/linkflow_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.linkFlow.campaign.model

# Dubbo 配置
dubbo:
  application:
    name: linkflow-campaign
    qos-enable: false
  registry:
    address: nacos://localhost:8848
    parameters:
      namespace: linkflow
  protocol:
    name: dubbo
    port: 20881
  scan:
    base-packages: com.linkFlow.campaign.service