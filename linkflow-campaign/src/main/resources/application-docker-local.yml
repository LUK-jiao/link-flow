server:
  port: 8084

spring:
  application:
    name: linkflow-campaign
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/short_link_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: kafka:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.linkflow.campaign.model

dubbo:
  application:
    name: linkflow-campaign
    qos-enable: false
  registry:
    address: nacos://nacos:8848
    parameters:
      namespace: linkflow
  protocol:
    name: dubbo
    port: 20884
    host: ${DUBBO_IP_TO_BIND:linkflow-campaign}
  scan:
    base-packages: com.linkflow.campaign.service

linkflow:
  campaign:
    kafka:
      topics:
        campaign-approved: campaign.approved
      consumer-group: linkflow-campaign-shortlink
