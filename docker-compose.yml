services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - linkflow-net

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - linkflow-net

  nacos:
    image: nacos/nacos-server:latest
    container_name: nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: ip
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: nacos
      NACOS_AUTH_TOKEN: y5Ct0qhV07lXWX8LVE+MOfbwruAk9IKAnqhHgXDa8+Q=
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TIME_ZONE: Asia/Shanghai
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    networks:
      - linkflow-net

  shortlink1:
    image: short-link-app:3.0
    container_name: shortlink1
    build:
      context: ../short-link
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - nacos
    environment:
      SPRING_PROFILES_ACTIVE: docker
      WORKER_ID: 1
      SERVER_PORT: 8080
      DUBBO_HOST: shortlink1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  shortlink2:
    image: short-link-app:3.0
    container_name: shortlink2
    depends_on:
      - shortlink1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      WORKER_ID: 2
      SERVER_PORT: 8081
      DUBBO_HOST: shortlink2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  shortlink3:
    image: short-link-app:3.0
    container_name: shortlink3
    depends_on:
      - shortlink1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      WORKER_ID: 3
      SERVER_PORT: 8082
      DUBBO_HOST: shortlink3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  nginx:
    image: nginx:latest
    container_name: nginx-shortlink
    depends_on:
      - shortlink1
      - shortlink2
      - shortlink3
    ports:
      - "18080:80"
    volumes:
      - ~/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - linkflow-net

  linkflow-user:
    image: linkflow-user:local
    container_name: linkflow-user
    build:
      context: ./linkflow-user
      dockerfile: Dockerfile
    depends_on:
      - nacos
    environment:
      SPRING_PROFILES_ACTIVE: docker-local
      DUBBO_IP_TO_BIND: linkflow-user
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  linkflow-campaign:
    image: linkflow-campaign:local
    container_name: linkflow-campaign
    build:
      context: ./linkflow-campaign
      dockerfile: Dockerfile
    depends_on:
      - nacos
      - kafka
      - shortlink1
      - linkflow-user
    environment:
      SPRING_PROFILES_ACTIVE: docker-local
      DUBBO_IP_TO_BIND: linkflow-campaign
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  linkflow-workflow:
    image: linkflow-workflow:local
    container_name: linkflow-workflow
    build:
      context: ./linkflow-workflow
      dockerfile: Dockerfile
    depends_on:
      - nacos
      - linkflow-user
      - linkflow-campaign
    environment:
      SPRING_PROFILES_ACTIVE: docker-local
      DUBBO_IP_TO_BIND: linkflow-workflow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - linkflow-net

  linkflow-gateway:
    image: linkflow-gateway:local
    container_name: linkflow-gateway
    build:
      context: ./linkflow-gateway
      dockerfile: Dockerfile
    depends_on:
      - nacos
      - linkflow-user
      - linkflow-campaign
      - linkflow-workflow
      - shortlink1
    environment:
      SPRING_PROFILES_ACTIVE: docker-local
    ports:
      - "18088:8088"
    networks:
      - linkflow-net

networks:
  linkflow-net:
    name: linkflow-net
