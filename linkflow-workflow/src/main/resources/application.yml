server:
  port: 8083

spring:
  application:
    name: linkflow-workflow
  datasource:
    # 业务数据库（审批记录等）
    url: jdbc:mysql://localhost:3306/linkflow_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: BusinessHikariPool

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.linkflow.workflow.model

# Dubbo 配置
dubbo:
  application:
    name: linkflow-workflow
    qos-enable: false
  registry:
    address: nacos://localhost:8848
    parameters:
      namespace: linkflow
  protocol:
    name: dubbo
    port: 20883
  scan:
    base-packages: com.linkflow.workflow.service
  consumer:
    check: false

# Flowable 配置（独立数据库）
flowable:
  datasource:
    url: jdbc:mysql://localhost:3306/linkflow_flowable?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: FlowableHikariPool
  database-schema-update: true
  check-process-definitions: true
  async-executor-activate: true