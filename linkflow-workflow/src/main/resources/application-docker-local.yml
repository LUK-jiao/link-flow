server:
  port: 8083

spring:
  application:
    name: linkflow-workflow
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/short_link_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

flowable:
  database-schema-update: true
  check-process-definitions: true
  async-executor-activate: false
  process-definition-location-prefix: classpath:/processes/
  process-definition-location-suffixes:
    - "**.bpmn20.xml"
  datasource:
    jdbc-url: jdbc:mysql://host.docker.internal:3306/linkflow_flowable?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.linkflow.workflow.model

dubbo:
  application:
    name: linkflow-workflow
    qos-enable: false
  registry:
    address: nacos://nacos:8848
    parameters:
      namespace: linkflow
      register-consumer-url: true
  protocol:
    name: dubbo
    port: 20883
    host: ${DUBBO_IP_TO_BIND:linkflow-workflow}
  scan:
    base-packages: com.linkflow.workflow.service

logging:
  level:
    com.linkflow.workflow: info
    org.flowable: info
